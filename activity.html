<!DOCTYPE html>

<html lang="en">
  <head>
    <title>Activity</title>
  </head>
  <body>
    <ul id="names">
      <li>John</li>
      <li>Mary</li>
      <li>Dora</li>
      <li>Donny</li>
    </ul>

    <script>
      function searchPerson(elemId, name) {
        let ele = document.querySelectorAll(`#${elemId} li`);

        console.log(ele);

        for (let i = 0; i < ele.length; i++) {
          if (ele[i].textContent === name) {
            console.log("Found");
            return;
          }
        }

        console.log("Not Found");
      }

      searchPerson("names", "Dushyanth"); //Not Found
      searchPerson("names", "John"); //Found
    </script>
  </body>
</html>
